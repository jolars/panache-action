name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pass:
    name: Pass (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - name: Run action (should pass)
        uses: ./
        with:
          path: fixtures/ok.md

  test-fail:
    name: Fail (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - name: Run action (should fail)
        id: expected-failure
        continue-on-error: true
        uses: ./
        with:
          path: fixtures/bad.md
      - name: Verify action failed
        shell: pwsh
        run: |
          if ("${{ steps.expected-failure.outcome }}" -eq "success") {
            Write-Host "Action unexpectedly passed"
            exit 1
          }

  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - test-pass
      - test-fail
    if: always()
    steps:
      - name: Check previous jobs
        shell: pwsh
        run: |
          if ("${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" -eq "true") {
            Write-Host "One or more jobs failed"
            exit 1
          }

  release:
    name: Release
    needs: all-tests-passed
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          npx --yes \
            --package @semantic-release/changelog \
            --package @semantic-release/git \
            --package conventional-changelog-conventionalcommits \
            --package semantic-release-replace-plugin \
            semantic-release
